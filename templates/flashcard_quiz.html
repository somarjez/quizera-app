<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flashcard Quiz - {{ topic_title }}</title>
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        color: #333;
        overflow-x: hidden;
      }

      .container {
        max-width: 900px;
        margin: 0 auto;
        padding: 2rem;
      }

      .header {
        text-align: center;
        margin-bottom: 2rem;
        color: white;
      }

      .header h1 {
        font-size: 2.5rem;
        margin-bottom: 0.5rem;
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
      }

      .quiz-info {
        background: rgba(255, 255, 255, 0.2);
        backdrop-filter: blur(10px);
        padding: 1rem 2rem;
        border-radius: 15px;
        display: flex;
        justify-content: space-around;
        margin-bottom: 2rem;
      }

      .info-item {
        text-align: center;
        color: white;
      }

      .info-label {
        font-size: 0.9rem;
        opacity: 0.9;
      }

      .info-value {
        font-size: 1.8rem;
        font-weight: 700;
        margin-top: 0.3rem;
      }

      .question-card {
        background: white;
        border-radius: 20px;
        padding: 3rem;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        margin-bottom: 2rem;
      }

      .question-number {
        color: #667eea;
        font-weight: 700;
        font-size: 1.1rem;
        margin-bottom: 1.5rem;
      }

      .question-text {
        font-size: 1.5rem;
        font-weight: 600;
        margin-bottom: 2rem;
        line-height: 1.6;
        color: #333;
      }

      .options-container {
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }

      .option {
        background: #f8f9fa;
        padding: 1.5rem;
        border-radius: 15px;
        cursor: pointer;
        transition: all 0.3s ease;
        border: 3px solid transparent;
        position: relative;
      }

      .option:hover:not(.disabled) {
        background: #e9ecef;
        border-color: #667eea;
        transform: translateX(10px);
      }

      .option.selected {
        border-color: #667eea;
        background: #e7f3ff;
      }

      .option.correct {
        border-color: #4caf50;
        background: #e8f5e9;
      }

      .option.incorrect {
        border-color: #f44336;
        background: #ffebee;
      }

      .option.disabled {
        cursor: not-allowed;
        opacity: 0.7;
      }

      .option-label {
        display: inline-block;
        width: 40px;
        height: 40px;
        background: #667eea;
        color: white;
        border-radius: 50%;
        text-align: center;
        line-height: 40px;
        font-weight: 700;
        margin-right: 1rem;
      }

      .option.correct .option-label {
        background: #4caf50;
      }

      .option.incorrect .option-label {
        background: #f44336;
      }

      .option-icon {
        position: absolute;
        right: 1.5rem;
        top: 50%;
        transform: translateY(-50%);
        font-size: 1.5rem;
      }

      .submit-btn {
        width: 100%;
        padding: 1.5rem;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        border-radius: 15px;
        font-size: 1.2rem;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.3s ease;
        margin-top: 1rem;
      }

      .submit-btn:hover:not(:disabled) {
        transform: translateY(-3px);
        box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
      }

      .submit-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .next-btn {
        background: linear-gradient(135deg, #4caf50 0%, #45a049 100%);
      }

      .explanation {
        background: #fff3cd;
        border-left: 4px solid #ffc107;
        padding: 1.5rem;
        border-radius: 10px;
        margin-top: 1.5rem;
        display: none;
      }

      .explanation.show {
        display: block;
      }

      .explanation h4 {
        color: #856404;
        margin-bottom: 0.5rem;
      }

      /* Results Screen */
      .results-screen {
        display: none;
        background: white;
        border-radius: 20px;
        padding: 3rem;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        text-align: center;
      }

      .results-screen.show {
        display: block;
      }

      .score-display {
        font-size: 5rem;
        font-weight: 700;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        margin: 2rem 0;
      }

      .score-message {
        font-size: 1.5rem;
        margin-bottom: 2rem;
        color: #666;
      }

      .stats-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        gap: 1.5rem;
        margin: 2rem 0;
      }

      .stat-card {
        background: #f8f9fa;
        padding: 1.5rem;
        border-radius: 15px;
      }

      .stat-value {
        font-size: 2rem;
        font-weight: 700;
        color: #667eea;
      }

      .stat-label {
        color: #666;
        margin-top: 0.5rem;
      }

      .action-buttons {
        display: flex;
        gap: 1rem;
        justify-content: center;
        margin-top: 2rem;
      }

      .btn {
        padding: 1rem 2rem;
        border: none;
        border-radius: 15px;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.3s ease;
        text-decoration: none;
        display: inline-block;
      }

      .btn-primary {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
      }

      .btn-secondary {
        background: #f0f0f0;
        color: #333;
      }

      .btn:hover {
        transform: translateY(-3px);
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
      }

      @media (max-width: 768px) {
        .container {
          padding: 1rem;
        }

        .question-card {
          padding: 2rem 1.5rem;
        }

        .question-text {
          font-size: 1.2rem;
        }

        .option {
          padding: 1rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1><i class="fas fa-graduation-cap"></i> Flashcard Quiz</h1>
        <p>{{ topic_title }}</p>
      </div>

      <!-- Quiz Info -->
      <div class="quiz-info">
        <div class="info-item">
          <div class="info-label">Question</div>
          <div class="info-value">
            <span id="currentQuestion">1</span>/<span id="totalQuestions"
              >0</span
            >
          </div>
        </div>
        <div class="info-item">
          <div class="info-label">Correct Answers</div>
          <div class="info-value" id="correctCount">0</div>
        </div>
        <div class="info-item">
          <div class="info-label">Accuracy</div>
          <div class="info-value" id="accuracyPercent">0%</div>
        </div>
      </div>

      <!-- Question Card -->
      <div id="quizContainer" class="question-card">
        <div class="question-number">
          Question <span id="questionNum">1</span>
        </div>
        <div class="question-text" id="questionText"></div>

        <div class="options-container" id="optionsContainer">
          <!-- Options will be inserted here -->
        </div>

        <div class="explanation" id="explanation">
          <h4><i class="fas fa-info-circle"></i> Correct Answer</h4>
          <p id="explanationText"></p>
        </div>

        <button class="submit-btn" id="submitBtn" onclick="checkAnswer()">
          <i class="fas fa-check"></i> Submit Answer
        </button>
      </div>

      <!-- Results Screen -->
      <div id="resultsScreen" class="results-screen">
        <i class="fas fa-trophy" style="font-size: 5rem; color: #ffd700"></i>
        <div class="score-display" id="finalScore">0%</div>
        <div class="score-message" id="scoreMessage"></div>

        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-value" id="totalAnswered">0</div>
            <div class="stat-label">Total Questions</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" style="color: #4caf50" id="correctAnswers">
              0
            </div>
            <div class="stat-label">Correct</div>
          </div>
          <div class="stat-card">
            <div
              class="stat-value"
              style="color: #f44336"
              id="incorrectAnswers"
            >
              0
            </div>
            <div class="stat-label">Incorrect</div>
          </div>
        </div>

        <div class="action-buttons">
          <button class="btn btn-secondary" onclick="retryQuiz()">
            <i class="fas fa-redo"></i> Try Again
          </button>
          <a
            href="{{ url_for('ai_flashcards', topic_id=topic_id) }}"
            class="btn btn-secondary"
          >
            <i class="fas fa-cards-blank"></i> Back to Flashcards
          </a>
        </div>

        <!-- Beautiful Back to Topic Button -->
        <div style="margin-top: 2rem">
          <a
            href="{{ url_for('view_topic', topic_id=topic_id) }}#top"
            class="btn btn-primary"
            style="
              background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
              color: white;
              padding: 1.25rem 3rem;
              font-size: 1.1rem;
              font-weight: 700;
              border-radius: 20px;
              box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
              transition: all 0.3s ease;
              display: inline-flex;
              align-items: center;
              gap: 0.75rem;
            "
            onmouseover="this.style.transform='translateY(-3px)'; this.style.boxShadow='0 15px 40px rgba(102, 126, 234, 0.5)';"
            onmouseout="this.style.transform='translateY(0)'; this.style.boxShadow='0 10px 30px rgba(102, 126, 234, 0.4)';"
          >
            <i class="fas fa-arrow-up"></i> Back to Top of Topic
          </a>
        </div>
      </div>
    </div>

    <script>
      let quizData = [];
      let currentQuestionIndex = 0;
      let score = 0;
      let correctAnswers = 0;
      let selectedOption = null;
      let answered = false;

      // Load quiz data from sessionStorage
      window.addEventListener("DOMContentLoaded", function () {
        const flashcardsData = sessionStorage.getItem("quizFlashcards");

        if (flashcardsData) {
          const flashcards = JSON.parse(flashcardsData);
          quizData = generateQuizFromFlashcards(flashcards);
          startQuiz();
        } else {
          alert("No quiz data found. Redirecting...");
          window.location.href =
            "{{ url_for('view_topic', topic_id=topic_id) }}";
        }
      });

      function generateQuizFromFlashcards(flashcards) {
        return flashcards.map((card) => {
          // Generate 3 wrong answers based on other cards
          const wrongAnswers = flashcards
            .filter((c) => c.answer !== card.answer)
            .sort(() => Math.random() - 0.5)
            .slice(0, 3)
            .map((c) => c.answer);

          // Combine and shuffle all options
          const options = [card.answer, ...wrongAnswers].sort(
            () => Math.random() - 0.5
          );

          return {
            question: card.question,
            options: options,
            correctAnswer: card.answer,
          };
        });
      }

      function startQuiz() {
        document.getElementById("totalQuestions").textContent = quizData.length;
        displayQuestion();
      }

      function displayQuestion() {
        if (currentQuestionIndex >= quizData.length) {
          showResults();
          return;
        }

        const question = quizData[currentQuestionIndex];
        answered = false;
        selectedOption = null;

        document.getElementById("currentQuestion").textContent =
          currentQuestionIndex + 1;
        document.getElementById("questionNum").textContent =
          currentQuestionIndex + 1;
        document.getElementById("questionText").textContent = question.question;
        document.getElementById("explanation").classList.remove("show");

        const optionsContainer = document.getElementById("optionsContainer");
        optionsContainer.innerHTML = "";

        question.options.forEach((option, index) => {
          const optionDiv = document.createElement("div");
          optionDiv.className = "option";
          optionDiv.onclick = () => selectOption(index);
          optionDiv.innerHTML = `
                    <span class="option-label">${String.fromCharCode(
                      65 + index
                    )}</span>
                    ${option}
                `;
          optionsContainer.appendChild(optionDiv);
        });

        document.getElementById("submitBtn").textContent = "Submit Answer";
        document.getElementById("submitBtn").onclick = checkAnswer;
        document.getElementById("submitBtn").innerHTML =
          '<i class="fas fa-check"></i> Submit Answer';
      }

      function selectOption(index) {
        if (answered) return;

        const options = document.querySelectorAll(".option");
        options.forEach((opt) => opt.classList.remove("selected"));
        options[index].classList.add("selected");
        selectedOption = index;
      }

      function checkAnswer() {
        if (selectedOption === null) {
          alert("Please select an answer");
          return;
        }

        if (answered) {
          // Move to next question
          currentQuestionIndex++;
          displayQuestion();
          return;
        }

        answered = true;
        const question = quizData[currentQuestionIndex];
        const options = document.querySelectorAll(".option");
        const selectedAnswer = question.options[selectedOption];
        const isCorrect = selectedAnswer === question.correctAnswer;

        // Disable all options
        options.forEach((opt) => opt.classList.add("disabled"));

        // Mark correct/incorrect
        if (isCorrect) {
          options[selectedOption].classList.add("correct");
          options[selectedOption].innerHTML +=
            '<i class="fas fa-check-circle option-icon" style="color: #4caf50;"></i>';
          correctAnswers++;
          document.getElementById("correctCount").textContent = correctAnswers;
        } else {
          options[selectedOption].classList.add("incorrect");
          options[selectedOption].innerHTML +=
            '<i class="fas fa-times-circle option-icon" style="color: #f44336;"></i>';

          // Highlight correct answer
          const correctIndex = question.options.indexOf(question.correctAnswer);
          options[correctIndex].classList.add("correct");
          options[correctIndex].innerHTML +=
            '<i class="fas fa-check-circle option-icon" style="color: #4caf50;"></i>';
        }

        // Update accuracy percentage
        const questionsAnswered = currentQuestionIndex + 1;
        const accuracy = Math.round((correctAnswers / questionsAnswered) * 100);
        document.getElementById("accuracyPercent").textContent = accuracy + "%";

        // Show explanation
        document.getElementById("explanationText").textContent =
          question.correctAnswer;
        document.getElementById("explanation").classList.add("show");

        // Change button to "Next"
        const submitBtn = document.getElementById("submitBtn");
        submitBtn.innerHTML =
          '<i class="fas fa-arrow-right"></i> Next Question';
        submitBtn.classList.add("next-btn");
      }

      function showResults() {
        document.getElementById("quizContainer").style.display = "none";
        document.getElementById("quiz-info").style.display = "none";

        const resultsScreen = document.getElementById("resultsScreen");
        resultsScreen.classList.add("show");

        const totalQuestions = quizData.length;
        const incorrectCount = totalQuestions - correctAnswers;
        const percentage =
          totalQuestions > 0
            ? Math.round((correctAnswers / totalQuestions) * 100)
            : 0;

        console.log("Quiz Results:", {
          totalQuestions,
          correctAnswers,
          incorrectCount,
          percentage,
        });

        document.getElementById("finalScore").textContent = percentage + "%";
        document.getElementById("totalAnswered").textContent = totalQuestions;
        document.getElementById("correctAnswers").textContent = correctAnswers;
        document.getElementById("incorrectAnswers").textContent =
          incorrectCount;

        let message = "";
        if (percentage === 100) {
          message = "🎉 Perfect Score! You're a master!";
        } else if (percentage >= 90) {
          message = "🌟 Outstanding! Almost perfect!";
        } else if (percentage >= 70) {
          message = "👏 Great job! Keep it up!";
        } else if (percentage >= 50) {
          message = "👍 Good effort! Review and try again!";
        } else {
          message = "📚 Keep studying! You'll get there!";
        }
        document.getElementById("scoreMessage").textContent = message;
      }

      function retryQuiz() {
        currentQuestionIndex = 0;
        score = 0;
        correctAnswers = 0;

        document.getElementById("correctCount").textContent = "0";
        document.getElementById("accuracyPercent").textContent = "0%";

        document.getElementById("resultsScreen").classList.remove("show");
        document.getElementById("quizContainer").style.display = "block";
        document.getElementById("quiz-info").style.display = "flex";

        // Shuffle quiz questions
        quizData = quizData.sort(() => Math.random() - 0.5);

        displayQuestion();
      }
    </script>
  </body>
</html>
